<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Usermedia MVP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 800px;
    }
    h1 {
      font-size: 1.5rem;
    }
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
    }
    /* Styling the <usermedia> tags to look and act like interactive buttons */
    usermedia {
      display: inline-block;
      padding: 10px 20px;
      background-color: #00bcd4;
      color: white;
      font-weight: bold;
      border: 1px solid #0097a7;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.2s;
    }
    usermedia:hover {
      background-color: #0097a7;
    }
    .video-display {
      width: 100%;
      max-width: 640px;
      height: 360px;
      background-color: #000;
      border: 2px solid #ccc;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    .log-container {
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 5px;
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
    }
    .log-entry { margin: 5px 0; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>

  <h1>Usermedia Element</h1>
  <p>Click the buttons below to request media. Ensure the Developer Console is open if you wish to see raw objects.</p>

  <div class="controls">
    <usermedia id="btn-audio">🎙️ Audio Only</usermedia>
    <usermedia id="btn-video">📹 Video Only</usermedia>
    <usermedia id="btn-both">🎥 Audio & Video</usermedia>
  </div>

  <video id="video-feed" class="video-display" autoplay muted playsinline></video>

  <div class="log-container" id="log-output">
    <div class="log-entry info">System: Ready. Waiting for interaction.</div>
  </div>

  <script>
    const videoFeed = document.getElementById('video-feed');
    const logOutput = document.getElementById('log-output');
    let currentStream = null;

    // --- Utility Functions ---

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logOutput.appendChild(entry);
      logOutput.scrollTop = logOutput.scrollHeight; // Auto-scroll to bottom
      
      if (type === 'error') console.error(message);
      else console.log(message);
    }

    function clearCurrentStream() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        videoFeed.srcObject = null;
        currentStream = null;
        log('Previous stream tracks stopped and cleared.', 'info');
      }
    }

    // --- Usermedia Element Setup ---

    function setupUsermedia(elementId, constraints, testName) {
      const umElement = document.getElementById(elementId);

      // Feature detection
      if (typeof umElement.setConstraints !== 'function') {
        log(`setupUsermedia failed: <usermedia> or setConstraints not supported.`, 'error');
        return;
      }

      // Apply constraints
      umElement.setConstraints(constraints);
      log(`Constraints set for ${testName}: ${JSON.stringify(constraints)}`, 'info');

      // Add onstream event handler
      umElement.onstream = function() {
        if (this.error) {
          log(`${testName} Failed: ${this.error.name} - ${this.error.message}`, 'error');
        } else if (this.stream) {
          clearCurrentStream();
          currentStream = this.stream;
          videoFeed.srcObject = currentStream;
          
          // Verify tracks
          const vTracks = currentStream.getVideoTracks().length;
          const aTracks = currentStream.getAudioTracks().length;
          log(`${testName} Success! Stream acquired (Video tracks: ${vTracks}, Audio tracks: ${aTracks})`, 'success');
        }
      };
    }

    // --- Initialization ---

    window.addEventListener('DOMContentLoaded', () => {
      // Check for global capability
      if (typeof window.HTMLUserMediaElement !== 'undefined') {
        log('HTMLUserMediaElement is supported in this browser environment.', 'success');
        
        // Initialize the three test cases
        setupUsermedia('btn-audio', { audio: true, video: false }, 'Audio Only');
        setupUsermedia('btn-video', { audio: false, video: true }, 'Video Only');
        setupUsermedia('btn-both', { audio: true, video: true }, 'Audio & Video');
      } else {
        log('HTMLUserMediaElement is NOT supported. Check your flags or Origin Trial token.', 'error');
      }
    });
  </script>

</body>
</html>
